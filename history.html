<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat History - JARVIS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-mini">
                    <i class="fas fa-robot"></i>
                </div>
                <h2>JARVIS</h2>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-btn" data-page="chat">
                    <i class="fas fa-comments"></i>
                    <span>New Chat</span>
                </button>
                <button class="nav-btn active" data-page="history">
                    <i class="fas fa-history"></i>
                    <span>Chat History</span>
                </button>
                <button class="nav-btn" data-page="favorites">
                    <i class="fas fa-star"></i>
                    <span>Favorites</span>
                </button>
                <button class="nav-btn" data-page="dashboard">
                    <i class="fas fa-chart-bar"></i>
                    <span>Statistics</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-secondary" id="clear-history-btn">
                    <i class="fas fa-trash"></i>
                    <span>Clear All</span>
                </button>
                <button class="btn-icon" id="dark-mode-toggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content-container">
            <div class="page-header">
                <h1>Chat History</h1>
                <p>Review your conversations with Jarvis</p>
            </div>

            <div class="history-controls">
                <input type="text" id="historySearch" placeholder="Search conversations...">
                <select id="historySort">
                    <option value="recent">Most Recent</option>
                    <option value="oldest">Oldest First</option>
                    <option value="confidence">Highest Confidence</option>
                </select>
            </div>

            <div class="history-list" id="historyList">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Loading history...</p>
                </div>
            </div>

            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Delete Conversation</h2>
                <button class="btn-icon close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this conversation?</p>
                <div class="modal-actions">
                    <button class="btn-secondary close-btn">Cancel</button>
                    <button class="btn-danger" id="confirm-delete">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/history.js') }}"></script>
</body>
</html>
